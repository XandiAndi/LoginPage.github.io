<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="headerText">
            <a href="index.html" class="headerText">Sign Up</a>
        </div>
        <div class="headerText">
            <a href="dataBase.html" class="headerText">Logindata</a>
        </div>
    </header>

    <main>

        <div style="text-align: center; display: block;">
            <form method="get" action="dataBase.html" enctype="multipart/form-data" id="nameForm">
                <div>
                    <label for="firstname">Vorname</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>

                <div>
                    <label for="lastname">Nachname</label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>

                <div>
                    <label for="work">Beruf</label>
                    <input type="text" id="work" name="work" required>
                </div>

                <div>
                    <label for="email">E-Mail Adresse</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="telNumber">Telefonnummer</label>
                    <input type="tel" placeholder="0-123-456-7890" id="telNumber" name="telNumber" required>
                </div>

                <input type="submit" id="submitBtn" class="btn" />
                <input type="reset" class="btn" />
            </form>
        </div>

    </main>

    <!--
    ?fistname=a&lastname=b

    ?: Start von Formulardaten
    key1=value1
    &: Trennzeichen für nächstes key value pair (Zuodnungen)

    {"firstname": "a"}
    let firstname= "a"
    -->

    <script src="form.js" defer></script>
</body>

</html>
